name: Release SuperFan macOS App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build macOS App & DMG
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: |
          npm run build
          npx tauri build --target universal-apple-darwin
          scripts/verify-fan-actuation-bundle.sh src-tauri/target/universal-apple-darwin/release/bundle/macos/SuperFan.app

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperFan-macOS-Universal
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
